name: Cypress End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Dependências e Executar Testes
        uses: cypress-io/github-action@v6
        with:
          build: npm install
          browser: chrome
