name: LinkedIn QA Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Executar testes com o Cypress Action
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
